apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: mydeployment
  name: nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: ghcr.io/akash3069/myweb:ec09a013cead0a2578d2000ed0b506b2557e8ea5
          ports:
            - containerPort: 80
      imagePullSecrets:
        - name: ghcr-secret

