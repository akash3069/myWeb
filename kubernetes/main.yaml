apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: mydeployment
  name: nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  strategy: {}
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - image: akash550/myimg
        name: nginx
        ports:
        - containerPort: 80

