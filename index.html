<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Adorable Web Page</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      background: linear-gradient(135deg, #ffdde1, #ee9ca7);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: white;
      padding: 30px 40px;
      border-radius: 20px;
      text-align: center;
      width: 320px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      animation: float 3s ease-in-out infinite;
    }

    h1 {
      color: #ff6f91;
      margin-bottom: 10px;
    }

    p {
      color: #555;
      font-size: 15px;
      margin-bottom: 20px;
    }

    button {
      background: #ff6f91;
      color: white;
      border: none;
      padding: 10px 22px;
      border-radius: 30px;
      font-size: 14px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #ff3f6c;
      transform: scale(1.05);
    }

    .emoji {
      font-size: 45px;
      margin-bottom: 10px;
      animation: bounce 1.5s infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    @keyframes bounce {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="emoji">🌸</div>
    <h1>Hello Master!</h1>
    <p>This is your cute little static webpage made with pure HTML & CSS booooooo 💖</p>
    <button>Fuck me master!!! ✨</button>
  </div>

</body>
</html>
