name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'kubernetes/main.yaml'  # prevent infinite loop

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Login to GHCR
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3️⃣ Build and push image (this is your original step)
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/myweb:${{ github.sha }}

      # 4️⃣ Update deployment.yaml with new image tag
      - name: Update deployment.yaml image
        run: |
          sed -i "s|image: .*|image: ghcr.io/${{ github.repository_owner }}/myweb:latest|g" kubernetes/main.yaml

      # 5️⃣ Commit updated deployment.yaml
      - name: Commit updated deployment.yaml
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add kubernetes/main.yaml
          git commit -m "Update deployment image to latest" || echo "No changes to commit"
          git push
